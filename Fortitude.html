<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Esto es un For</h1>
    <div id="html-span">
        <label for="">
            <button onclick="CeroToTen()"> 0 a 10</button>
            <div id="html-div"></div>
        </label>
        <label for="">
            <button onclick="TenToCero()"> 10 a 0</button>
            <div id="html-div-2"></div>
        </label>
        <label for="">
            <h2>Introduce un valor al que llegar</h2>
            <input type="number" id="user-input">
            <button onclick="ForInput()"> Enter</button>
            <div id="html-div-3"></div>
        </label>
    </div>
</body>

<script>
    function CeroToTen(){

    console.log("Funcion ejecutandose");
    const numeros = 10;
        for(let i = 0; i <= numeros; i++){
        /*
        const span = document.getElementById("html-span");
        const div = document.getElementById("html-div");
        */

        const div = document.getElementById("html-div");
        const spin = document.createElement("div");
        spin.innerHTML = `el numero vale: ${i}`;
        console.log(i);

        div.appendChild(spin)
        
        }
    }

    function TenToCero(){

    console.log("Funcion ejecutandose");
    const numeros = 0;
        for(let i = 10; i >= numeros; i--){
        /*
        const span = document.getElementById("html-span");
        const div = document.getElementById("html-div");
        */

        const div = document.getElementById("html-div-2");
        const spin = document.createElement("div");
        spin.innerHTML = `el numero vale: ${i}`;
        console.log(i);

        div.appendChild(spin)
        
        }
    }

    function ForInput(){

    console.log("Funcion ejecutandose");
    const numeros = document.getElementById("user-input");
        for(let i = 0; i <= Number(numeros.value); i++){
        /*
        const span = document.getElementById("html-span");
        const div = document.getElementById("html-div");
        */

        const div = document.getElementById("html-div-3");
        const spin = document.createElement("div");
        spin.innerHTML = `el numero vale: ${i}`;
        console.log(i);

        div.appendChild(spin)
        
        }
    }


</script>
</html>
