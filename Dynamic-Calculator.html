<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculadora Dinamica</h1>
    <h2>Suma</h2>
    <input type="number" id="sum-num-1">
    <span>+</span>
    <input type="number" id="sum-num-2">
    <button onclick="Sum()">Sumar</button>
    <span>Resusltado: </span>
    <span id="sum-output"></span>
    <p></p>
    <h2>Resta</h2>
    <input type="number" id="subs-num-1">
    <input type="number" id="subs-num-2">
    <button onclick="Substract()">Restar</button>
    <span>Resultado: </span>
    <span id="sub-output"></span>
    <p></p>
    <h2>Multiplicacion</h2>
    <input type="number" id="mult-num-1">
    <input type="number" id="mult-num-2">
    <button onclick="Multiply()">Multiplicar</button>
    <span>Resultado: </span>
    <span id="mult-output"></span>
    <p></p>
    <h2>Division</h2>
    <input type="number" id="div-num-1">
    <input type="number" id="div-num-2">
    <button onclick="Division()">Division</button>
    <span>Resultado: </span>
    <span id="div-output"></span>
    <p></p>
    <h2>Residuo</h2>
    <input type="number" id="rem-num-1">
    <input type="number" id="rem-num-2">
    <button onclick="Remaining()">Residuo</button>
    <span>Resultado: </span>
    <span id="rem-output"></span>
    

    
</body>

<script> 

    function Sum(){
        const input_1 = document.getElementById("sum-num-1");
        const input_2 = document.getElementById("sum-num-2");
        let sum = Number(input_1.value) + Number(input_2.value);
        const resultadoCaja = document.getElementById("sum-output");
        resultadoCaja.innerHTML = sum;

        /*console.log(input_1.value);
        console.log(input_2.value);
        console.log(suma);*/
    }

    function Substract(){
        const input_1 = document.getElementById("subs-num-1");
        const input_2 = document.getElementById("subs-num-2");
        let subs = Number(input_1.value) - Number(input_2.value);
        const resultadoCaja = document.getElementById("sub-output");
        resultadoCaja.innerHTML = subs;
    }

    function Multiply(){
        const input_1 = document.getElementById("mult-num-1");
        const input_2 = document.getElementById("mult-num-2");
        let subs = Number(input_1.value) * Number(input_2.value);
        const resultadoCaja = document.getElementById("mult-output");
        resultadoCaja.innerHTML = subs;
    }

    function Division(){
        const input_1 = document.getElementById("div-num-1");
        const input_2 = document.getElementById("div-num-2");
        let subs = Number(input_1.value) / Number(input_2.value);
        const resultadoCaja = document.getElementById("div-output");
        resultadoCaja.innerHTML = subs;
    }
    function Remaining(){
        const input_1 = document.getElementById("rem-num-1");
        const input_2 = document.getElementById("rem-num-2");
        let subs = Number(input_1.value) % Number(input_2.value);
        const resultadoCaja = document.getElementById("rem-output");
        resultadoCaja.innerHTML = subs;
    }
